<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage Tests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-result {
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            background-color: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 4px;
        }
        h1 { color: #333; }
        h2 { color: #555; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Local Storage Helper Functions - Unit Tests</h1>
    <div id="test-results"></div>
    <div id="summary" class="summary"></div>

    <script src="../js/app.js"></script>
    <script>
        // Test runner
        let passCount = 0;
        let failCount = 0;
        const results = document.getElementById('test-results');
        const summaryEl = document.getElementById('summary');

        function assert(condition, testName) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'test-result';
            
            if (condition) {
                resultDiv.classList.add('pass');
                resultDiv.textContent = '✓ PASS: ' + testName;
                passCount++;
            } else {
                resultDiv.classList.add('fail');
                resultDiv.textContent = '✗ FAIL: ' + testName;
                failCount++;
            }
            
            results.appendChild(resultDiv);
        }

        function assertEqual(actual, expected, testName) {
            const passed = JSON.stringify(actual) === JSON.stringify(expected);
            assert(passed, testName + (passed ? '' : ` (expected: ${JSON.stringify(expected)}, got: ${JSON.stringify(actual)})`));
        }

        function runTests() {
            console.log('Starting Local Storage tests...');
            
            // Clear Local Storage before tests
            localStorage.clear();

            // ==============================================
            // persistTasks() Tests
            // ==============================================
            
            console.log('\n--- persistTasks() Tests ---');
            
            // Test 1: Save empty tasks array
            assert(persistTasks([]), 'persistTasks() should successfully save empty array');
            assertEqual(localStorage.getItem('dashboard_tasks'), '[]', 'Empty array should be stored as "[]"');
            
            // Test 2: Save single task
            const singleTask = [{ id: '123', description: 'Test task', completed: false }];
            assert(persistTasks(singleTask), 'persistTasks() should save single task');
            const storedSingle = JSON.parse(localStorage.getItem('dashboard_tasks'));
            assertEqual(storedSingle, singleTask, 'Stored single task should match input');
            
            // Test 3: Save multiple tasks
            const multipleTasks = [
                { id: '1', description: 'Task 1', completed: false },
                { id: '2', description: 'Task 2', completed: true },
                { id: '3', description: 'Task 3', completed: false }
            ];
            assert(persistTasks(multipleTasks), 'persistTasks() should save multiple tasks');
            const storedMultiple = JSON.parse(localStorage.getItem('dashboard_tasks'));
            assertEqual(storedMultiple, multipleTasks, 'Stored multiple tasks should match input');
            
            // Test 4: Reject non-array input
            assert(!persistTasks('not an array'), 'persistTasks() should reject string input');
            assert(!persistTasks({ tasks: [] }), 'persistTasks() should reject object input');
            assert(!persistTasks(null), 'persistTasks() should reject null input');
            assert(!persistTasks(undefined), 'persistTasks() should reject undefined input');

            // ==============================================
            // loadTasks() Tests
            // ==============================================
            
            console.log('\n--- loadTasks() Tests ---');
            
            // Test 5: Load existing tasks
            localStorage.setItem('dashboard_tasks', JSON.stringify(multipleTasks));
            const loadedTasks = loadTasks();
            assertEqual(loadedTasks, multipleTasks, 'loadTasks() should return stored tasks');
            
            // Test 6: Load when no data exists
            localStorage.removeItem('dashboard_tasks');
            const emptyLoad = loadTasks();
            assertEqual(emptyLoad, [], 'loadTasks() should return empty array when no data exists');
            
            // Test 7: Handle malformed JSON
            localStorage.setItem('dashboard_tasks', '{invalid json}');
            const malformedLoad = loadTasks();
            assertEqual(malformedLoad, [], 'loadTasks() should return empty array for malformed JSON');
            
            // Test 8: Handle non-array JSON
            localStorage.setItem('dashboard_tasks', JSON.stringify({ tasks: [] }));
            const nonArrayLoad = loadTasks();
            assertEqual(nonArrayLoad, [], 'loadTasks() should return empty array for non-array JSON');
            
            // Test 9: Filter out invalid task objects
            const mixedTasks = [
                { id: '1', description: 'Valid task', completed: false },
                { id: '2', description: 'Missing completed' },
                { description: 'Missing id', completed: false },
                { id: '3', completed: false },
                'not an object',
                null,
                { id: '4', description: 'Another valid task', completed: true }
            ];
            localStorage.setItem('dashboard_tasks', JSON.stringify(mixedTasks));
            const filteredTasks = loadTasks();
            assertEqual(filteredTasks.length, 2, 'loadTasks() should filter out invalid tasks');
            assertEqual(filteredTasks[0].id, '1', 'First valid task should be preserved');
            assertEqual(filteredTasks[1].id, '4', 'Second valid task should be preserved');

            // ==============================================
            // persistQuickLinks() Tests
            // ==============================================
            
            console.log('\n--- persistQuickLinks() Tests ---');
            localStorage.clear();
            
            // Test 10: Save empty links array
            assert(persistQuickLinks([]), 'persistQuickLinks() should successfully save empty array');
            assertEqual(localStorage.getItem('dashboard_quicklinks'), '[]', 'Empty array should be stored as "[]"');
            
            // Test 11: Save single link
            const singleLink = [{ id: '123', name: 'GitHub', url: 'https://github.com' }];
            assert(persistQuickLinks(singleLink), 'persistQuickLinks() should save single link');
            const storedLink = JSON.parse(localStorage.getItem('dashboard_quicklinks'));
            assertEqual(storedLink, singleLink, 'Stored single link should match input');
            
            // Test 12: Save multiple links
            const multipleLinks = [
                { id: '1', name: 'GitHub', url: 'https://github.com' },
                { id: '2', name: 'Google', url: 'https://google.com' },
                { id: '3', name: 'Stack Overflow', url: 'https://stackoverflow.com' }
            ];
            assert(persistQuickLinks(multipleLinks), 'persistQuickLinks() should save multiple links');
            const storedLinks = JSON.parse(localStorage.getItem('dashboard_quicklinks'));
            assertEqual(storedLinks, multipleLinks, 'Stored multiple links should match input');
            
            // Test 13: Reject non-array input
            assert(!persistQuickLinks('not an array'), 'persistQuickLinks() should reject string input');
            assert(!persistQuickLinks({ links: [] }), 'persistQuickLinks() should reject object input');
            assert(!persistQuickLinks(null), 'persistQuickLinks() should reject null input');
            assert(!persistQuickLinks(undefined), 'persistQuickLinks() should reject undefined input');

            // ==============================================
            // loadQuickLinks() Tests
            // ==============================================
            
            console.log('\n--- loadQuickLinks() Tests ---');
            
            // Test 14: Load existing links
            localStorage.setItem('dashboard_quicklinks', JSON.stringify(multipleLinks));
            const loadedLinks = loadQuickLinks();
            assertEqual(loadedLinks, multipleLinks, 'loadQuickLinks() should return stored links');
            
            // Test 15: Load when no data exists
            localStorage.removeItem('dashboard_quicklinks');
            const emptyLinksLoad = loadQuickLinks();
            assertEqual(emptyLinksLoad, [], 'loadQuickLinks() should return empty array when no data exists');
            
            // Test 16: Handle malformed JSON
            localStorage.setItem('dashboard_quicklinks', '{invalid json}');
            const malformedLinksLoad = loadQuickLinks();
            assertEqual(malformedLinksLoad, [], 'loadQuickLinks() should return empty array for malformed JSON');
            
            // Test 17: Handle non-array JSON
            localStorage.setItem('dashboard_quicklinks', JSON.stringify({ links: [] }));
            const nonArrayLinksLoad = loadQuickLinks();
            assertEqual(nonArrayLinksLoad, [], 'loadQuickLinks() should return empty array for non-array JSON');
            
            // Test 18: Filter out invalid link objects
            const mixedLinks = [
                { id: '1', name: 'GitHub', url: 'https://github.com' },
                { id: '2', name: 'Missing URL' },
                { name: 'Missing ID', url: 'https://google.com' },
                { id: '3', url: 'https://stackoverflow.com' },
                'not an object',
                null,
                { id: '4', name: 'Stack Overflow', url: 'https://stackoverflow.com' }
            ];
            localStorage.setItem('dashboard_quicklinks', JSON.stringify(mixedLinks));
            const filteredLinks = loadQuickLinks();
            assertEqual(filteredLinks.length, 2, 'loadQuickLinks() should filter out invalid links');
            assertEqual(filteredLinks[0].id, '1', 'First valid link should be preserved');
            assertEqual(filteredLinks[1].id, '4', 'Second valid link should be preserved');

            // ==============================================
            // Serialization Round-Trip Tests
            // ==============================================
            
            console.log('\n--- Serialization Round-Trip Tests ---');
            localStorage.clear();
            
            // Test 19: Tasks round-trip
            const originalTasks = [
                { id: 'task-1', description: 'Buy groceries', completed: false },
                { id: 'task-2', description: 'Write code', completed: true }
            ];
            persistTasks(originalTasks);
            const roundTripTasks = loadTasks();
            assertEqual(roundTripTasks, originalTasks, 'Tasks should survive round-trip serialization');
            
            // Test 20: Links round-trip
            const originalLinks = [
                { id: 'link-1', name: 'GitHub', url: 'https://github.com' },
                { id: 'link-2', name: 'MDN', url: 'https://developer.mozilla.org' }
            ];
            persistQuickLinks(originalLinks);
            const roundTripLinks = loadQuickLinks();
            assertEqual(roundTripLinks, originalLinks, 'Links should survive round-trip serialization');

            // ==============================================
            // Display Summary
            // ==============================================
            
            summaryEl.innerHTML = `
                <h2>Test Summary</h2>
                <p><strong>Total Tests:</strong> ${passCount + failCount}</p>
                <p><strong>Passed:</strong> ${passCount}</p>
                <p><strong>Failed:</strong> ${failCount}</p>
                <p><strong>Success Rate:</strong> ${((passCount / (passCount + failCount)) * 100).toFixed(1)}%</p>
            `;
            
            console.log('\n=== Test Summary ===');
            console.log(`Total: ${passCount + failCount}`);
            console.log(`Passed: ${passCount}`);
            console.log(`Failed: ${failCount}`);
            
            // Clean up
            localStorage.clear();
        }

        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
